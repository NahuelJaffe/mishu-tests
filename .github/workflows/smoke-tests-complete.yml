              npx playwright test tests/smoke-tests-complete.spec.js --grep "TC-00[1-5]|TC-00[7-9]|TC-01[0-4]" --project=firefox --reporter=html --timeout=120000 --max-failures=5 --retries=1
              ;;
            "all")
              echo "🧪 Ejecutando TC-001 a TC-016 (All smoke tests, excluyendo TC-006 MANUAL)"
              npx playwright test tests/smoke-tests-complete.spec.js --grep "TC-00[1-5]|TC-00[7-9]|TC-01[0-6]" --project=firefox --reporter=html --timeout=120000 --max-failures=5 --retries=1
              ;;
          esac
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
